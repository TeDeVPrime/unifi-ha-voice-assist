global:
  language: "en"
  agent_id: "home_assistant"
  wake_word: "hey_unifi"
  require_known_face: true
  require_person_presence: true
  response_enabled_default: true

cameras:
  - camera_id: "669f8e9c02c50003e4000123"
    camera_name: "Living Room G6"
    enabled: true
    rtsp_source: null
    speaker_media_player: "media_player.living_room_speaker"
    tts_entity: "tts.google_translate_en_com"
    allowed_faces:
      - "Ted"
      - "Maria"
    session_open_seconds: 10
    cooldown_seconds: 20
    save_audio_debug: true
    response_enabled: true
    require_known_face: true
    require_person_presence: true
    person_sensor: "binary_sensor.living_room_person_detected"

  - camera_id: "669f8e9c02c50003e4000456"
    camera_name: "Kitchen G6"
    enabled: false
    rtsp_source: null
    speaker_media_player: "media_player.kitchen_display"
    tts_entity: "tts.google_translate_en_com"
    allowed_faces:
      - "Ted"
